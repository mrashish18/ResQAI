version: '3.9'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: resqai_db
    environment:
      POSTGRES_DB: resqai
      POSTGRES_USER: resqai_user
      POSTGRES_PASSWORD: resqai_secure_password_2024
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - resqai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U resqai_user -d resqai"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: resqai_backend
    environment:
      DATABASE_URL: postgresql://resqai_user:resqai_secure_password_2024@postgres:5432/resqai
      SECRET_KEY: your-super-secret-jwt-key-change-in-production-2024
      ACCESS_TOKEN_EXPIRE_MINUTES: 10080
      ENVIRONMENT: production
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - resqai_network
    volumes:
      - ./backend/uploads:/app/uploads
    restart: unless-stopped

  # React Frontend (Nginx)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: resqai_frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - backend
    networks:
      - resqai_network
    restart: unless-stopped

networks:
  resqai_network:
    driver: bridge

volumes:
  postgres_data:
